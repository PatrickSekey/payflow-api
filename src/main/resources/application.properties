# src/main/resources/application.properties

# Database Configuration
# H2 is an in-memory database - perfect for development and testing
spring.datasource.url=jdbc:h2:mem:payflowdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
# Enables the H2 database web console for easy viewing and querying
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
# spring.jpa.show-sql=true displays SQL statements in the console for debugging
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true formats the SQL for better readability
spring.jpa.properties.hibernate.format_sql=true
# Creates the database schema based on entity definitions
spring.jpa.hibernate.ddl-auto=create-drop
# Sets the SQL dialect for H2 database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Server Configuration
# The embedded Tomcat server runs on port 8080 by default
server.port=8080

# Logging Configuration
# Sets the logging level for the application
logging.level.com.payflow=DEBUG